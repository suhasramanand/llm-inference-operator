# This rule is not used by the project llm-inference-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over inference.llm.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: llm-inference-operator
    app.kubernetes.io/managed-by: kustomize
  name: llminferencecluster-admin-role
rules:
- apiGroups:
  - inference.llm.io
  resources:
  - llminferenceclusters
  verbs:
  - '*'
- apiGroups:
  - inference.llm.io
  resources:
  - llminferenceclusters/status
  verbs:
  - get
